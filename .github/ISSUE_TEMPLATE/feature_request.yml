name: ✨ 기능 제안 (외부)
description: 매거진 코드·도구·자동화에 새 기능을 제안합니다
title: "[FEATURE] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        매거진 기능 제안 감사합니다. 14일 내 1차 분류 + 응답을 목표로 합니다.

        - **콘텐츠 주제 제안**은 [GitHub Discussions Ideas](https://github.com/shinbuheon-prog/claude-magazine/discussions/categories/ideas)로 부탁드립니다.
        - **운영 정책 토론**은 [GitHub Discussions General](https://github.com/shinbuheon-prog/claude-magazine/discussions/categories/general)로.
        - 본 양식은 **코드·도구·자동화 기능 추가**에 한정합니다.

  - type: textarea
    id: use_case
    attributes:
      label: 사용 사례 — 왜 필요한가
      description: 이 기능이 어떤 운영 시나리오에서 필요한지. 가능하면 구체 예시.
      placeholder: |
        예시) Reddit r/ClaudeAI 인기 토픽을 매거진 Insight 코너에 자동 반영하려면
        Reddit OAuth API 어댑터가 필요합니다.
    validations:
      required: true

  - type: textarea
    id: proposed_behavior
    attributes:
      label: 구체 동작 명세
      description: 어떻게 작동해야 하는지. CLI 인자·입출력 형식·UI 명세 등.
      placeholder: |
        예시)
        - 신규 모듈: `pipeline/ingesters/reddit.py`
        - CLI: `python pipeline/ingesters/reddit.py --subreddit ClaudeAI --since-days 30`
        - 출력: `data/source_registry.db`에 OAuth 인증된 Reddit post 메타데이터 등록
        - 인용 한도: 200자 + author + permalink (governance.md 준수)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안 검토
      description: 기존 도구·SOP로 가능한지. 외부 OSS 후보가 있는지.
      placeholder: |
        예시) 편집자 수동 큐레이션 + baoyu-url-to-markdown skill로 가능하나
        매월 30~50건 처리는 비효율. menshun (Aho-Corasick) 알고리즘 차용 후 자체 구현 권장.

  - type: dropdown
    id: policy_alignment
    attributes:
      label: 매거진 운영 정책 정합성
      description: 본 기능이 매거진 정체성·정책과 정합하는지 확인.
      options:
        - "✅ 무료 발행·인간 편집·AI 보조 원칙과 정합 (외부 OSS 채택·운영 도구 등)"
        - "🟡 부분 정합 — 일부 정책 검토 필요 (X·Threads 자동 크롤링 기각 등 본 매거진 기존 결정에 영향)"
        - "❌ 비정합 — 정책 변경이 필요한 기능 (예: 유료 구독 시스템 — 본 매거진 비권장)"
        - "❓ 잘 모르겠음 — 편집장 판단 요청"
    validations:
      required: true

  - type: textarea
    id: priority_context
    attributes:
      label: 우선순위 컨텍스트 (선택)
      description: |
        매거진 5월 호 발행에 영향이 있는지, 6월 호 이후로 적합한지.
        외부 PoC 의존성·작업량·기여 가능 여부 명시.

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: CONTRIBUTING.md §"매거진 정체성·정책"을 읽었습니다
          required: true
        - label: 기존 Issues·Discussions에서 동일·유사 제안이 없는지 검색했습니다
          required: true
        - label: 본 제안이 무료 발행·인간 편집·AI 보조 원칙과 정합한지 검토했습니다
          required: true
