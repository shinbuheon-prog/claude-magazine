name: 🐛 버그 리포트 (외부)
description: 매거진 코드·파이프라인·CI에서 발견한 버그를 보고합니다
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        매거진 운영 과정에서 발견한 버그를 보고해 주셔서 감사합니다. 7일 내 분류 + 14일 내 1차 응답을 목표로 합니다.

        - 매거진 정체성·운영 정책: [README.md](https://github.com/shinbuheon-prog/claude-magazine#readme) · [CONTRIBUTING.md](https://github.com/shinbuheon-prog/claude-magazine/blob/main/CONTRIBUTING.md)
        - 콘텐츠 주제 제안은 [GitHub Discussions](https://github.com/shinbuheon-prog/claude-magazine/discussions)로 부탁드립니다.

  - type: textarea
    id: description
    attributes:
      label: 버그 요약
      description: 어떤 문제가 발생했나요? 1~2문장으로.
      placeholder: 예시) `scripts/curate_classmethodkr_best.py --month 2026-04` 실행 시 RSS fetch 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 단계
      description: 1·2·3 번호로 명시해 주세요. 가능하면 실행한 정확한 명령어 포함.
      placeholder: |
        1. `git clone https://github.com/shinbuheon-prog/claude-magazine.git`
        2. `pip install -r requirements.txt`
        3. `python scripts/curate_classmethodkr_best.py --month 2026-04`
        4. → 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      description: 정상 동작 시 어떻게 되어야 하는지.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      description: 실제로 어떻게 되었는지. 에러 메시지·로그·스크린샷 첨부.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 환경 (OS · Python 버전 · git commit hash)
      placeholder: 예시) Windows 11 / Python 3.10.11 / git e66da2a
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 관련 로그·request_id (있으면)
      description: |
        `logs/` 디렉토리의 관련 파일 또는 stdout 첨부.
        Claude API 호출 관련 버그라면 request_id 포함.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: README.md와 CONTRIBUTING.md를 읽었습니다
          required: true
        - label: 기존 Issues에서 동일·유사 버그가 없는지 검색했습니다
          required: true
        - label: 매거진 governance.md 개인정보 처리 원칙에 따라 민감 정보를 본 보고에서 제외했습니다
          required: true
