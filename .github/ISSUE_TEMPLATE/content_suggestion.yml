name: 📖 콘텐츠 주제 제안 (간단 등록)
description: 매거진에서 다뤘으면 하는 Claude 주제를 빠르게 제안 (Discussions가 더 적합하지만 Issue로도 가능)
title: "[CONTENT] "
labels: ["content-idea", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > 💡 **콘텐츠 주제 제안은 [GitHub Discussions Ideas](https://github.com/shinbuheon-prog/claude-magazine/discussions/categories/ideas) 카테고리가 더 적합합니다.** 토론·투표·다른 사용자 의견 수렴이 가능합니다.
        > 본 Issue 양식은 **빠른 등록**용입니다. 깊이 있는 제안은 Discussions로 부탁드립니다.

        매거진은 한국어권 Claude 실무자에게 도움이 되는 콘텐츠를 우선 채택합니다.
        7일 내 편집장 1차 검토 + Backlog 등록 여부 결정 + 14일 내 응답.

  - type: input
    id: topic
    attributes:
      label: 주제 1줄
      placeholder: 예시) Claude Code Channels로 Slack에서 원격 코드 리뷰 자동화하기
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 매거진 카테고리 후보
      description: 어느 카테고리에 적합한지. 잘 모르겠으면 "편집장 판단 요청"
      options:
        - Cover Story (특집 14p)
        - Deep Dive (심층 4p)
        - Insight (데이터 3p)
        - Interview (대담 5p)
        - Review (제품·도구 3p)
        - 편집장 판단 요청
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: 왜 이 주제인가 — 한국어권 Claude 실무자 관점
      description: 어떤 독자에게 어떤 도움이 되는지. 구체 운영 시나리오면 좋음.
      placeholder: |
        예시) 한국 개발팀이 Slack 중심으로 일하는데, 외부 코드 리뷰 시
        Claude Code를 직접 호출하기 어려운 경우가 많습니다. Channels 기능으로
        Slack 스레드 안에서 Claude Code 세션을 운영하는 운영 패턴을 정리하면
        한국 사용자에게 직접 도움이 됩니다.
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: 외부 cross-check source (있으면)
      description: |
        Anthropic/AWS 공식 docs · 논문 · 본인 블로그·GitHub 등.
        매거진은 모든 주장에 source_id를 연결합니다.
      placeholder: |
        예시)
        - https://code.claude.com/docs/ko/slack
        - https://blog.naver.com/classmethodkr/... (본인 운영 사례)

  - type: textarea
    id: contributor_note
    attributes:
      label: 본인 기고 가능 여부 (선택)
      description: |
        직접 기고를 원하시는 경우 매거진 본문에 source_id로 명시 인용 + 블로그 링크 노출 (트래픽 유입).
        현재 무료 기고만 받습니다 (CONTRIBUTING.md FAQ Q4 참조).
      placeholder: |
        예시) 본인이 한국 개발팀 운영 사례를 직접 정리해 본인 블로그에 게시 + 매거진 본문 인용 가능

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 본 주제가 매거진 무료 발행·인간 편집·AI 보조 정체성과 정합합니다
          required: true
        - label: 기존 Issues·Discussions에서 동일·유사 제안이 없는지 검색했습니다
          required: true
        - label: (선택) 본인 기고 시 매거진 라이선스 정책에 따름을 동의합니다
