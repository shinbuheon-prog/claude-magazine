services:
  ghost:
    image: ghost:5-alpine
    container_name: claude-magazine-ghost
    restart: unless-stopped
    ports:
      - "2368:2368"
    environment:
      url: ${GHOST_URL}
      database__client: sqlite3
      database__connection__filename: /var/lib/ghost/content/data/ghost.db
      database__useNullAsDefault: true
      mail__transport: SMTP
      mail__from: ${MAIL_FROM}
      mail__options__service: ${SMTP_SERVICE}
      mail__options__host: ${SMTP_HOST}
      mail__options__port: ${SMTP_PORT}
      mail__options__secure: ${SMTP_SECURE}
      mail__options__auth__user: ${SMTP_USER}
      mail__options__auth__pass: ${SMTP_PASS}
      NODE_ENV: production
    volumes:
      - ghost_content:/var/lib/ghost/content
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:2368/ghost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ghost_content:
    driver: local
