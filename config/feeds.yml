# Claude Magazine 소스 자동 수집 피드 목록 (TASK_032)
#
# 필드:
#   name: 피드 표시명 (unique)
#   url: RSS/Atom URL
#   language: ko | en | ja | zh
#   stance: pro | neutral | con
#   is_official: 공식 발행처 여부 (true/false)
#   topics: 피드가 주로 다루는 주제 (태깅용)
#   enabled: false로 두면 수집 제외

feeds:
  # ── AI 기술 공식 발행처 ──────────────────────
  - name: "Anthropic News"
    type: rss
    url: "https://www.anthropic.com/news/feed.xml"
    language: en
    stance: neutral
    is_official: true
    topics: [claude, ai_models, anthropic]
    enabled: true

  - name: "OpenAI Blog"
    type: rss
    url: "https://openai.com/blog/rss.xml"
    language: en
    stance: neutral
    is_official: true
    topics: [gpt, ai_models, openai]
    enabled: true

  - name: "Google AI Blog"
    type: rss
    url: "https://blog.google/technology/ai/rss/"
    language: en
    stance: neutral
    is_official: true
    topics: [gemini, ai_models, google]
    enabled: true

  # ── 자체 콘텐츠 (사내 기술블로그) ──────────────
  # 자체 콘텐츠이므로 rights_status: free + is_official: true.
  # 매거진 "Korea Spotlight" 코너의 데이터 소스. 베스트 기고 큐레이션은
  # scripts/curate_classmethodkr_best.py 가 별도 실행.
  - name: "Classmethod Korea Tech Blog"
    type: rss
    url: "https://rss.blog.naver.com/classmethodkr.xml"
    language: ko
    stance: neutral
    is_official: true
    rights_status: free
    topics: [claude, aws, internal_blog, korea]
    enabled: true

  # ── 한국 공식 기관 ──────────────────────────
  - name: "KISA 보도자료"
    type: rss
    url: "https://www.kisa.or.kr/20301/rss"
    language: ko
    stance: neutral
    is_official: true
    topics: [security, ai_regulation, privacy]
    enabled: true

  - name: "과기정통부 보도자료"
    type: rss
    url: "https://www.msit.go.kr/rss/msitRSS.do"
    language: ko
    stance: neutral
    is_official: true
    topics: [ict_policy, ai_policy]
    enabled: true

  # ── 기술 뉴스 ──────────────────────────────
  - name: "TechCrunch AI"
    type: rss
    url: "https://techcrunch.com/category/artificial-intelligence/feed/"
    language: en
    stance: neutral
    is_official: false
    topics: [ai_news, startups]
    enabled: true

  # ── 커뮤니티 / 연구 ─────────────────────────
  - name: "Hacker News (Front Page)"
    type: rss
    url: "https://hnrss.org/frontpage"
    language: en
    stance: neutral
    is_official: false
    topics: [tech_general, ai_news]
    enabled: false  # 노이즈 많아 기본 비활성화

  - name: "arXiv cs.AI (new)"
    type: rss
    url: "http://arxiv.org/rss/cs.AI"
    language: en
    stance: neutral
    is_official: true
    topics: [ai_research, papers]
    enabled: false  # 수량 너무 많아 수동 활성화

  # ── TASK_040: baoyu wrapper sample entries ─────────────────────────
  - name: "arXiv cs.AI (Claude keywords)"
    type: arxiv
    url: "http://export.arxiv.org/api/query"
    query: "claude OR anthropic OR constitutional ai OR rlhf"
    category: cs.AI
    since_days: 30
    max_results: 100
    language: en
    stance: neutral
    is_official: true
    rights_status: free
    topics: [arxiv, papers, claude, ai_research]
    enabled: true

  - name: "Hacker News (Claude keywords)"
    type: hackernews
    url: "https://hn.algolia.com/api/v1/search"
    query: "claude OR anthropic OR mcp"
    since_days: 30
    min_points: 10
    max_results: 50
    language: en
    stance: neutral
    is_official: false
    rights_status: free
    quote_limit: 100
    topics: [hackernews, claude, ai_news, community]
    enabled: true

  - name: "Reddit r/ClaudeAI (Claude keywords)"
    type: reddit
    url: "https://oauth.reddit.com"
    subreddits: [ClaudeAI, LocalLLaMA, MachineLearning]
    query: "claude OR anthropic OR mcp"
    since_days: 30
    min_score: 20
    max_results: 50
    language: en
    stance: neutral
    is_official: false
    rights_status: free
    quote_limit: 200
    topics: [reddit, claude, ai_news, community]
    enabled: false

  - name: "Single URL Sample"
    type: url
    url: "https://example.com/article"
    language: en
    stance: neutral
    is_official: false
    topics: [sample, article]
    skill: baoyu-url-to-markdown
    enabled: false

  - name: "YouTube Sample"
    type: youtube
    url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    language: en
    stance: neutral
    is_official: false
    topics: [sample, video]
    skill: baoyu-youtube-transcript
    enabled: false
